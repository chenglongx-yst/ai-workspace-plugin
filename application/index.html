<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>C盘垃圾回收大师</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <div class="shell">
      <header class="titlebar">
        <div class="titlebar-brand">
          <span class="titlebar-logo" aria-hidden="true">
            <svg viewBox="0 0 40 40" width="28" height="28">
              <defs>
                <linearGradient id="binG" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#7dd3fc" />
                  <stop offset="100%" stop-color="#2563eb" />
                </linearGradient>
              </defs>
              <rect x="8" y="12" width="24" height="22" rx="4" fill="url(#binG)" />
              <rect x="6" y="8" width="28" height="6" rx="3" fill="#93c5fd" />
              <rect x="15" y="4" width="10" height="5" rx="2" fill="#bfdbfe" />
              <path d="M14 18h3v12h-3zm9 0h3v12h-3z" fill="#eff6ff" opacity=".85" />
            </svg>
          </span>
          <h1>C盘垃圾回收大师</h1>
        </div>
      </header>

      <div class="app">
        <section class="hero">
          <div class="hero-left">
            <div id="scan-status" class="status-line">
              <span class="status-text">正在扫描…</span>
            </div>
            <div class="freeable-label">可释放空间</div>
            <div class="freeable">
              <span id="freeable-gb" class="freeable-num">—</span>
              <span class="freeable-unit">GB</span>
            </div>
            <button id="btn-one-click" type="button" class="btn-pill" disabled>一键清理</button>
            <p id="scan-hint" class="hero-hint">正在分析 C 盘垃圾文件…</p>
          </div>
          <div class="hero-mascot" aria-hidden="true">
            <div class="spark s1"></div>
            <div class="spark s2"></div>
            <div class="spark s3"></div>
            <svg class="mascot-svg" viewBox="0 0 200 200" width="168" height="168">
              <defs>
                <radialGradient id="blobG" cx="35%" cy="30%" r="70%">
                  <stop offset="0%" stop-color="#93c5fd" />
                  <stop offset="55%" stop-color="#3b82f6" />
                  <stop offset="100%" stop-color="#1d4ed8" />
                </radialGradient>
                <linearGradient id="capG" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="#60a5fa" />
                  <stop offset="100%" stop-color="#1e40af" />
                </linearGradient>
              </defs>
              <ellipse cx="100" cy="175" rx="58" ry="10" fill="#93c5fd" opacity=".35" />
              <circle cx="100" cy="108" r="62" fill="url(#blobG)" />
              <ellipse cx="78" cy="88" rx="14" ry="10" fill="#fff" opacity=".35" />
              <path d="M55 58c0-28 90-28 90 8 0 14-20 22-45 22S55 80 55 58z" fill="url(#capG)" />
              <ellipse cx="100" cy="52" rx="18" ry="8" fill="#1e3a8a" />
              <text x="100" y="78" text-anchor="middle" fill="#fff" font-size="11" font-weight="800" font-family="Nunito,sans-serif">C盘小能手</text>
              <circle cx="82" cy="112" r="7" fill="#0f172a" />
              <circle cx="118" cy="112" r="7" fill="#0f172a" />
              <circle cx="84" cy="110" r="2.2" fill="#fff" />
              <circle cx="120" cy="110" r="2.2" fill="#fff" />
              <path d="M88 132c8 8 16 8 24 0" stroke="#1e3a8a" stroke-width="3.5" fill="none" stroke-linecap="round" />
              <g transform="translate(138,95) rotate(25)">
                <rect x="0" y="0" width="8" height="70" rx="3" fill="#a16207" />
                <rect x="-10" y="-8" width="28" height="14" rx="4" fill="#e2e8f0" />
                <path d="M-8 6h24l-4 18h-16z" fill="#64748b" />
              </g>
              <g transform="translate(28,118)">
                <rect x="8" y="18" width="44" height="36" rx="6" fill="#2563eb" />
                <rect x="4" y="10" width="52" height="12" rx="4" fill="#60a5fa" />
                <rect x="18" y="26" width="6" height="20" fill="#bfdbfe" opacity=".9" />
                <rect x="28" y="26" width="6" height="20" fill="#fde68a" opacity=".95" />
                <rect x="38" y="26" width="6" height="20" fill="#f9a8d4" opacity=".95" />
              </g>
            </svg>
          </div>
        </section>

        <section class="card overview">
          <div class="ov-col">
            <div class="ov-icon drive">
              <svg viewBox="0 0 48 48" width="40" height="40">
                <rect x="6" y="10" width="36" height="28" rx="6" fill="#3b82f6" />
                <rect x="10" y="14" width="28" height="16" rx="3" fill="#93c5fd" />
                <circle cx="34" cy="34" r="3" fill="#fff" />
              </svg>
            </div>
            <div class="ov-body">
              <div class="ov-line"><span>C盘总空间</span> <strong id="disk-total">—</strong></div>
              <div class="bar green"><i id="disk-used-bar" style="width:0%"></i></div>
              <div id="disk-used-text" class="ov-sub">已用 —</div>
            </div>
          </div>
          <div class="ov-divider"></div>
          <div class="ov-col">
            <div class="donut-wrap">
              <svg id="donut" class="donut" viewBox="0 0 42 42" width="52" height="52">
                <circle class="donut-track" cx="21" cy="21" r="15.5" />
                <circle id="donut-arc" class="donut-arc" cx="21" cy="21" r="15.5" />
              </svg>
            </div>
            <div class="ov-body">
              <div class="ov-line"><span>可用空间</span> <strong id="disk-free">—</strong></div>
              <div id="disk-free-pct" class="ov-sub accent-orange">—</div>
            </div>
          </div>
          <div class="ov-divider"></div>
          <div class="ov-col">
            <div class="ov-icon junk">
              <svg viewBox="0 0 48 48" width="40" height="40">
                <rect x="12" y="16" width="24" height="24" rx="5" fill="#22c55e" />
                <rect x="10" y="12" width="28" height="8" rx="3" fill="#4ade80" />
                <rect x="18" y="8" width="12" height="6" rx="2" fill="#86efac" />
                <path d="M20 24h3v12h-3zm5 0h3v12h-3z" fill="#ecfdf5" />
              </svg>
            </div>
            <div class="ov-body">
              <div class="ov-line"><span>本次可释放</span> <strong id="junk-gb">—</strong></div>
              <div id="junk-pct" class="ov-sub accent-green">—</div>
            </div>
          </div>
        </section>

        <section class="card cats" id="cat-icons"></section>

        <section class="card details">
          <header class="details-head">
            <h2>垃圾详情</h2>
            <div class="details-actions">
              <button id="btn-expand" type="button" class="linkish">全部展开</button>
              <button id="btn-rescan" type="button" class="linkish">重新扫描</button>
            </div>
          </header>
          <div id="cat-list" class="cat-list"></div>
        </section>
      </div>

      <footer class="bottom-bar">
        <button id="btn-deep" type="button" class="btn-deep" disabled>
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path fill="currentColor" d="M12 2l8 3v6c0 5.25-3.4 9.74-8 11-4.6-1.26-8-5.75-8-11V5l8-3zm0 2.18L6 6.3v4.7c0 4.11 2.55 7.68 6 8.82 3.45-1.14 6-4.71 6-8.82V6.3l-6-2.12z"/>
          </svg>
          深度清理
        </button>
        <button id="btn-clean-now" type="button" class="btn-clean" disabled>
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path fill="currentColor" d="M13 3L4 14h6l-1 7 10-12h-6l0-6z"/>
          </svg>
          <span id="btn-clean-label">立即清理</span>
        </button>
      </footer>
    </div>

    <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-card">
        <h3 id="modal-title">确认清理</h3>
        <p id="modal-warn" class="modal-warn"></p>
        <ul id="modal-actions" class="modal-list"></ul>
        <div class="modal-btns">
          <button id="modal-cancel" type="button" class="btn-deep">取消</button>
          <button id="modal-ok" type="button" class="btn-clean">确认清理</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast hidden" role="status"></div>
    <div id="busy" class="busy hidden" aria-live="polite">
      <div class="busy-card">
        <div class="busy-spinner"></div>
        <div id="busy-text">处理中…</div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
