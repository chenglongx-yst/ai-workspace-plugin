<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM 对话</title>
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <h1>LLM 对话</h1>
          <span id="conn-status" class="pill warn">初始化中…</span>
        </div>
        <div class="topbar-actions">
          <label class="model-label">
            模型
            <select id="model-select" disabled>
              <option value="">加载中…</option>
            </select>
          </label>
          <button id="btn-new-chat" type="button" class="ghost" title="新对话">新对话</button>
        </div>
      </header>

      <nav class="tabs" role="tablist">
        <button type="button" class="tab active" data-mode="bridge" role="tab" aria-selected="true">
          对话桥
        </button>
        <button type="button" class="tab" data-mode="direct" role="tab" aria-selected="false">
          模型直连
        </button>
      </nav>

      <main id="messages" class="messages" aria-live="polite">
        <div class="empty-hint" id="empty-hint">
          发送消息开始对话。可在顶部切换「对话桥」或「模型直连」。
        </div>
      </main>

      <footer class="composer">
        <textarea
          id="input"
          rows="2"
          placeholder="输入消息，Enter 发送，Shift+Enter 换行"
          disabled
        ></textarea>
        <div class="composer-actions">
          <button id="btn-stop" type="button" class="ghost danger" disabled>停止</button>
          <button id="btn-send" type="button" disabled>发送</button>
        </div>
      </footer>
    </div>

    <script src="./aiw-identity.js"></script>
    <script src="./aiw-dialogue.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
